<!DOCTYPE html>
<html lang="id">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Kedai Kopi Senja</h1>
        <nav>
            <a href="index.html">Beranda</a>
            <a href="menu.html">Menu Kami</a>
            <a href="contact.html">Kontak</a>
        </nav>
    </header>

    <div class="container">
        <h2>Hubungi Kami</h2>
        <p>Punya pertanyaan? Silakan isi formulir di bawah ini.</p>
        <form action="#" method="POST">
            <label for="nama">Nama Lengkap:</label>
            <input type="text" id="nama" name="nama" placeholder="Masukkan nama Anda" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="Masukkan email Anda" required>

            <label for="pesan">Pesan / Pertanyaan:</label>
            <textarea id="pesan" name="pesan" rows="5" placeholder="Tulis pesan Anda di sini..." required></textarea>

            <button type="submit">Kirim Pesan</button>
        </form>
    </div>

</body>
</html>
